version: "3.8"

# =============================================================
# pi_instagram_stack — Docker Compose
# =============================================================
# PostgreSQL (pgvector) + Redis for the Instagram Reels pipeline.
# n8n is provided by the shared pi_n8n_stack (see ../pi_n8n_stack).
# =============================================================

services:
  postgres_instagram:
    image: pgvector/pgvector:pg16
    container_name: postgres_instagram
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ig_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ig_secure_pass_2025}
      POSTGRES_DB: ${POSTGRES_DB:-instagram_rag}
    ports:
      - "5435:5432"
    volumes:
      - pgdata_instagram:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ig_user -d instagram_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - instagram_stack_net

  redis_instagram:
    image: redis:7-alpine
    container_name: redis_instagram
    restart: unless-stopped
    command: >-
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6381:6379"
    volumes:
      - redis_instagram_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - instagram_stack_net
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata_instagram:
  redis_instagram_data:

networks:
  instagram_stack_net:
    name: instagram_stack_net
    driver: bridge
