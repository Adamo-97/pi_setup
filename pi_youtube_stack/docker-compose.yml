# ============================================================================
# YouTube Content Generation Stack — Docker Compose
# ============================================================================
# Fully isolated stack for Raspberry Pi 5:
#   - PostgreSQL 16 with pgvector extension (for RAG)
#   - Redis for rate limiting & budget cache
# n8n is provided by the shared pi_n8n_stack (see ../pi_n8n_stack).
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector — RAG Database
  # --------------------------------------------------------------------------
  postgres_youtube:
    image: pgvector/pgvector:pg16
    container_name: postgres_youtube
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-youtube_rag}
      POSTGRES_USER: ${POSTGRES_USER:-yt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: ${TZ:-Europe/Stockholm}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Persistent data storage
      - postgres_youtube_data:/var/lib/postgresql/data
      # Auto-run schema initialization on first start
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-yt_user} -d ${POSTGRES_DB:-youtube_rag}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - youtube_stack_net
    # Raspberry Pi memory constraints
    deploy:
      resources:
        limits:
          memory: 512M

  # --------------------------------------------------------------------------
  # Redis — Rate Limiting & Budget Cache (The Bouncer)
  # --------------------------------------------------------------------------
  redis_youtube:
    image: redis:7-alpine
    container_name: redis_youtube
    restart: unless-stopped
    command: >-
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_youtube_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - youtube_stack_net
    deploy:
      resources:
        limits:
          memory: 64M

# ----------------------------------------------------------------------------
# Volumes — persistent data across container restarts
# ----------------------------------------------------------------------------
volumes:
  postgres_youtube_data:
    driver: local
  redis_youtube_data:
    driver: local

# ----------------------------------------------------------------------------
# Network — isolated bridge network for this stack
# ----------------------------------------------------------------------------
networks:
  youtube_stack_net:
    name: youtube_stack_net
    driver: bridge
