version: "3.8"

# =============================================================
# pi_x_stack — Docker Compose
# =============================================================
# PostgreSQL (pgvector) + Redis for X/Twitter pipeline.
# n8n is provided by the shared pi_n8n_stack (see ../pi_n8n_stack).
# =============================================================

services:
  postgres_x:
    image: pgvector/pgvector:pg16
    container_name: postgres_x
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-x_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-x_secure_pass_2025}
      POSTGRES_DB: ${POSTGRES_DB:-x_rag}
    ports:
      - "5436:5432"
    volumes:
      - pgdata_x:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U x_user -d x_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - x_stack_net

  redis_x:
    image: redis:7-alpine
    container_name: redis_x
    restart: unless-stopped
    command: >-
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6382:6379"
    volumes:
      - redis_x_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - x_stack_net
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata_x:
  redis_x_data:

networks:
  x_stack_net:
    name: x_stack_net
    driver: bridge
