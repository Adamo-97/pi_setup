# =============================================================
# pi_hole_stack — Docker Compose
# =============================================================
# Pi-hole — DNS sinkhole + ad blocker (ARM64 / Raspberry Pi 5)
# Upstream DNS: Cloudflare 1.1.1.1 + 1.0.0.1
#
# Ports:
#   53   → DNS (TCP + UDP)
#   8080 → Pi-hole web dashboard
# =============================================================

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "${PIHOLE_WEB_PORT:-8080}:80/tcp"
    environment:
      TZ: ${TZ:-Europe/Stockholm}
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD:-changeme}
      FTLCONF_dns_upstreams: "1.1.1.1;1.0.0.1"
      FTLCONF_dns_dnssec: "true"
      # "ALL" allows queries from any origin (LAN devices via Docker bridge).
      # "LOCAL" silently rejects LAN queries and floods logs with warnings.
      FTLCONF_dns_listeningMode: "ALL"
      FTLCONF_dns_queryLogging: "false"
    volumes:
      - pihole_config:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
      - ./pihole/custom.list:/etc/pihole/custom.list:ro
    cap_add:
      - NET_ADMIN
    # Prevent pihole from consuming all system memory and freezing the Pi
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      # Query pi.hole (resolved locally by pihole itself — no upstream needed,
      # avoids DNSSEC timeout on external domains)
      test: ["CMD", "dig", "+short", "+time=5", "pi.hole", "@127.0.0.1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 90s
    labels:
      - "autoheal=true"

  # Watches for unhealthy containers and restarts them.
  # Docker's restart policy only fires on container exit, not on health failures.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    environment:
      # Only restart containers with the autoheal=true label
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 60
      AUTOHEAL_START_PERIOD: 120
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pihole_config:
    driver: local
  pihole_dnsmasq:
    driver: local
