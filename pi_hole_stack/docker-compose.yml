# =============================================================
# pi_hole_stack — Docker Compose
# =============================================================
# Pi-hole — DNS sinkhole + ad blocker (ARM64 / Raspberry Pi 5)
# Upstream DNS: Cloudflare 1.1.1.1 + 1.0.0.1
#
# Ports:
#   53   → DNS (TCP + UDP)
#   8080 → Pi-hole web dashboard
# =============================================================

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "${PIHOLE_WEB_PORT:-8080}:80/tcp"
    environment:
      TZ: ${TZ:-Europe/Stockholm}
      WEBPASSWORD: ${PIHOLE_PASSWORD:-changeme}
      FTLCONF_LOCAL_IPV4: ${HOST_IP:-192.168.0.11}
      PIHOLE_DNS_: "1.1.1.1;1.0.0.1"
      DNSSEC: "true"
      DNSMASQ_LISTENING: local
      PIHOLE_LOGGING: "true"
      QUERY_LOGGING: "true"
    volumes:
      - pihole_config:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
      - ./pihole/custom.list:/etc/pihole/custom.list:ro
    cap_add:
      - NET_ADMIN
    healthcheck:
      # Query pi.hole (resolved locally by pihole itself — no upstream needed,
      # avoids DNSSEC timeout on external domains)
      test: ["CMD", "dig", "+short", "+time=5", "pi.hole", "@127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Watches for unhealthy containers and restarts them.
  # Docker's restart policy only fires on container exit, not on health failures.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pihole_config:
    driver: local
  pihole_dnsmasq:
    driver: local
