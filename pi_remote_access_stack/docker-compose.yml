# ============================================================================
# Pi Remote Access Stack
# ============================================================================
# Secure remote access via Tailscale (WireGuard VPN).
# Tailscale runs NATIVELY as a systemd service — no Docker container needed.
#
# Manage Tailscale:
#   tailscale status               → view connected devices
#   sudo tailscale up              → connect / re-authenticate
#   sudo tailscale down            → disconnect
#   tailscale ssh raspberrypi      → SSH from any tailnet device
#
# Zero inbound ports open on the home router.
# ============================================================================

# No Docker services — Tailscale is managed by systemd (tailscaled.service)
