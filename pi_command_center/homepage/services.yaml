- Shared Services:
    - n8n:
        icon: n8n.svg
        href: http://{{HOMEPAGE_VAR_HOST_IP}}:5678
        description: Workflow engine (all pipelines)
        server: pi-docker
        container: n8n

    - Mattermost:
        icon: mattermost.svg
        href: http://{{HOMEPAGE_VAR_HOST_IP}}:8065
        description: Pipeline approval hub
        server: pi-docker
        container: mattermost

    - Pi-hole:
        icon: pi-hole.svg
        href: http://{{HOMEPAGE_VAR_HOST_IP}}:8080/admin
        description: DNS sinkhole & ad blocker
        server: pi-docker
        container: pihole
        widget:
          type: pihole
          url: "{{HOMEPAGE_VAR_PIHOLE_URL}}"

